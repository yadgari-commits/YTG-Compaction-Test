<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="manifest.json">
    <title>Civil Master Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.10/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;400;700;900&display=swap');
        
        :root {
            --primary: #fbbf24;
            --bg-dark: #0f172a;
            --panel: #1e293b;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: var(--bg-dark);
            color: #e2e8f0;
            margin: 0;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
        }

        .neo-panel {
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .gold-glow {
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            color: #000;
            font-weight: 900;
            transition: all 0.2s;
        }

        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }

        .loading-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loader {
            border: 3px solid #1e293b;
            border-top: 3px solid #fbbf24;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .formula-box {
            background: rgba(251, 191, 36, 0.05);
            border-right: 3px solid var(--primary);
            font-family: monospace;
            font-size: 0.8rem;
        }

        ::-webkit-scrollbar { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .level-bg {
            width: 250px; height: 250px; border-radius: 50%;
            background: #1e293b; border: 8px solid #334155;
            position: relative; margin: 0 auto;
        }
        .level-bubble {
            width: 40px; height: 40px; background: radial-gradient(circle at 30% 30%, #fbbf24, #d97706);
            border-radius: 50%; position: absolute; transition: all 0.05s linear;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.5);
        }
        .level-center {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            border: 2px solid rgba(251, 191, 36, 0.3); border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        .ruler-container {
            height: 100%; width: 60px; background: #1e293b;
            border-left: 2px solid var(--primary); position: relative;
        }
        .ruler-tick { position: absolute; left: 0; background: var(--primary); }
    </style>
</head>
<body>
    <div id="loading" class="loading-screen">
        <div class="loader mb-4"></div>
        <p class="text-sm font-black text-amber-500 italic tracking-widest uppercase">Initializing Suite</p>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Initialize Encyclopedia Database
        const db = new Dexie("CivilEncyclopediaDB");
        db.version(1).stores({
            terms: '++id, enTitle, faTitle, category, acronym, *tags',
            favorites: 'id',
            history: '++id, termId, timestamp'
        });

        const App = () => {
            const [view, setView] = useState('home');
            const [ready, setReady] = useState(false);

            useEffect(() => {
                if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
                
                // Seed Initial Data (Demonstration)
                const seedData = async () => {
                    const count = await db.terms.count();
                    if (count === 0) {
                        const starterTerms = [
                            { 
                                enTitle: "Proctor Test", 
                                faTitle: "ØªØ³Øª Ù¾Ø±ÙˆÚ©ØªÙˆØ±", 
                                enDef: "A laboratory method of experimentally determining the optimal moisture content at which a given soil type will become most dense.", 
                                faDef: "ÛŒÚ© Ø±ÙˆØ´ Ø¢Ø²Ù…Ø§ÛŒØ´Ú¯Ø§Ù‡ÛŒ Ø¨Ø±Ø§ÛŒ ØªØ¹ÛŒÛŒÙ† Ø±Ø·ÙˆØ¨Øª Ø¨Ù‡ÛŒÙ†Ù‡ Ú©Ù‡ Ø¯Ø± Ø¢Ù† Ù†ÙˆØ¹ Ø®Ø§ØµÛŒ Ø§Ø² Ø®Ø§Ú© Ø¨Ù‡ Ø¨ÛŒØ´ØªØ±ÛŒÙ† Ú©Ø«Ø§ÙØª Ø®ÙˆØ¯ Ù…ÛŒâ€ŒØ±Ø³Ø¯.", 
                                category: "Soil Mechanics", 
                                acronym: "MDD",
                                standards: "ASTM D698, AASHTO T99",
                                related: "CBR, OMC, FDT",
                                applications: "Embankments, Road bases, Dams",
                                formula: "Ï_dry = Ï_wet / (1 + w/100)"
                            },
                            { 
                                enTitle: "California Bearing Ratio", 
                                faTitle: "Ù†Ø³Ø¨Øª Ø¨Ø§Ø±Ø¨Ø±ÛŒ Ú©Ø§Ù„ÛŒÙØ±Ù†ÛŒØ§", 
                                enDef: "A penetration test for evaluation of the mechanical strength of natural ground, subgrades and base courses.", 
                                faDef: "ØªØ³Øª Ù†ÙÙˆØ° Ø¨Ø±Ø§ÛŒ Ø§Ø±Ø²ÛŒØ§Ø¨ÛŒ Ù…Ù‚Ø§ÙˆÙ…Øª Ù…Ú©Ø§Ù†ÛŒÚ©ÛŒ Ø²Ù…ÛŒÙ† Ø·Ø¨ÛŒØ¹ÛŒØŒ Ø³Ø§Ø¨â€ŒÚ¯Ø±ÛŒØ¯ Ùˆ Ù„Ø§ÛŒÙ‡â€ŒÙ‡Ø§ÛŒ Ø§Ø³Ø§Ø³.", 
                                category: "Pavement Engineering", 
                                acronym: "CBR",
                                standards: "ASTM D1883, AASHTO T193",
                                related: "DCP, Proctor Test",
                                applications: "Pavement Design, Subgrade strength"
                            },
                            { 
                                enTitle: "Slump Test", 
                                faTitle: "ØªØ³Øª Ø§Ø³Ù„Ø§Ù…Ù¾", 
                                enDef: "A laboratory or field test used to measure the consistency of fresh concrete.", 
                                faDef: "Ø¢Ø²Ù…Ø§ÛŒØ´ Ø¢Ø²Ù…Ø§ÛŒØ´Ú¯Ø§Ù‡ÛŒ ÛŒØ§ Ø³Ø§Ø­ÙˆÛŒ Ø¨Ø±Ø§ÛŒ Ø§Ù†Ø¯Ø§Ø²Ù‡â€ŒÚ¯ÛŒØ±ÛŒ Ú©Ø§Ø±Ø§ÛŒÛŒ Ùˆ Ø±ÙˆØ§Ù†ÛŒ Ú©Ø§Ù†Ú©Ø±ÛŒØª ØªØ§Ø²Ù‡.", 
                                category: "Concrete Technology", 
                                acronym: "SLUMP",
                                standards: "ASTM C143, BS 1881",
                                related: "Workability, W/C Ratio",
                                applications: "Concrete Quality Control"
                            },
                            { 
                                enTitle: "Maximum Dry Density", 
                                faTitle: "Ú©Ø«Ø§ÙØª Ø®Ø´Ú© Ø§Ø¹Ø¸Ù…ÛŒ", 
                                enDef: "The maximum density obtained in a proctor test at optimum moisture content.", 
                                faDef: "Ø¨ÛŒØ´ØªØ±ÛŒÙ† Ú©Ø«Ø§ÙØªÛŒ Ú©Ù‡ Ø¯Ø± ØªØ³Øª Ù¾Ø±ÙˆÚ©ØªÙˆØ± Ø¯Ø± Ø±Ø·ÙˆØ¨Øª Ø¨Ù‡ÛŒÙ†Ù‡ Ø¨Ù‡ Ø¯Ø³Øª Ù…ÛŒâ€ŒØ¢ÛŒØ¯.", 
                                category: "Soil Mechanics", 
                                acronym: "MDD",
                                standards: "ASTM D1557",
                                related: "OMC, Compaction",
                                formula: "Î³d = Ws / V"
                            }
                        ];
                        await db.terms.bulkAdd(starterTerms);
                    }
                };
                
                seedData().then(() => {
                    setTimeout(() => { 
                        document.getElementById('loading').style.display = 'none'; 
                        setReady(true); 
                    }, 800);
                });
            }, []);

            if (!ready) return null;

            const renderView = () => {
                switch(view) {
                    case 'home': return <Home setView={setView} />;
                    case 'fdt': return <FDTCalculator onBack={() => setView('home')} />;
                    case 'proctor': return <ProctorCalculator onBack={() => setView('home')} />;
                    case 'brick': return <BrickCalculator onBack={() => setView('home')} />;
                    case 'concrete': return <ConcreteCalculator onBack={() => setView('home')} />;
                    case 'steel': return <SteelCalculator onBack={() => setView('home')} />;
                    case 'slope': return <SlopeCalculator onBack={() => setView('home')} />;
                    case 'geometry': return <GeometryCalculator onBack={() => setView('home')} />;
                    case 'calculator': return <Calculator onBack={() => setView('home')} />;
                    case 'converter': return <UnitConverter onBack={() => setView('home')} />;
                    case 'date': return <DateConverter onBack={() => setView('home')} />;
                    case 'ruler': return <Ruler onBack={() => setView('home')} />;
                    case 'level': return <BubbleLevel onBack={() => setView('home')} />;
                    case 'glossary': return <Encyclopedia onBack={() => setView('home')} />;
                    case 'about': return <AboutView onBack={() => setView('home')} />;
                    default: return <Home setView={setView} />;
                }
            };

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto bg-slate-950 relative overflow-hidden fade-in shadow-2xl">
                    <header className="pt-10 pb-6 px-6 bg-slate-900/90 backdrop-blur-lg border-b border-white/5 flex justify-between items-center z-50">
                        <div onClick={() => setView('home')} className="cursor-pointer text-right">
                            <h1 className="text-xl font-black text-white italic tracking-tighter uppercase">CIVIL<span className="text-amber-400">MASTER</span> PRO</h1>
                            <p className="text-[9px] font-bold text-amber-500/80 tracking-widest uppercase italic">Yadgari Engineering Tool</p>
                        </div>
                        <button onClick={() => setView('about')} className="w-10 h-10 rounded-2xl bg-amber-400 flex items-center justify-center shadow-lg gold-glow active:scale-95 transition-all">
                            <i className="fas fa-info-circle text-slate-900 text-lg"></i>
                        </button>
                    </header>
                    <main className="flex-1 overflow-y-auto px-5 py-6 pb-32 no-scrollbar">
                        {renderView()}
                    </main>
                    <nav className="absolute bottom-0 left-0 right-0 h-20 bg-slate-900/95 backdrop-blur-xl border-t border-white/5 flex justify-around items-center px-4 pb-4 z-50">
                        <NavBtn active={view === 'home'} icon="fa-th-large" l1="Ù…Ù†ÙˆÛŒ Ø§ØµÙ„ÛŒ" l2="Main Menu" onClick={() => setView('home')} />
                        <NavBtn active={['calculator', 'converter', 'date', 'ruler', 'level'].includes(view)} icon="fa-tools" l1="Ø§Ø¨Ø²Ø§Ø±Ù‡Ø§" l2="Tools" onClick={() => setView('calculator')} />
                        <NavBtn active={['fdt', 'proctor', 'brick', 'concrete', 'steel', 'slope', 'geometry'].includes(view)} icon="fa-calculator" l1="Ù…Ø­Ø§Ø³Ø¨Ø§Øª" l2="Calculations" onClick={() => setView('fdt')} />
                    </nav>
                </div>
            );
        };

        const NavBtn = ({ active, icon, l1, l2, onClick }) => (
            <button onClick={onClick} className={`flex flex-col items-center gap-0.5 transition-all ${active ? 'text-amber-400 scale-105' : 'text-slate-500 opacity-60'}`}>
                <i className={`fas ${icon} text-lg`}></i>
                <span className="text-[9px] font-black tracking-tighter">{l1}</span>
                <span className="text-[7px] font-bold uppercase opacity-60 tracking-tighter">{l2}</span>
            </button>
        );

        const Home = ({ setView }) => {
            const sections = [
                { t1: "Ù…Ø­Ø§Ø³Ø¨Ø§Øª Ø§Ù†Ø¬Ù†ÛŒØ±ÛŒ", t2: "Engineering Calculations", tools: [
                    { id: 'fdt', n1: 'Ú©Ù…Ù¾Ú©Ø´Ù† ØªØ³Øª', n2: 'Compaction Test', i: 'fa-vial', c: 'border-blue-500/20' },
                    { id: 'proctor', n1: 'ØªØ³Øª Ù¾Ø±ÙˆÚ©ØªÙˆØ± (MDD)', n2: 'Proctor (MDD)', i: 'fa-weight-hanging', c: 'border-red-500/20' },
                    { id: 'brick', n1: 'Ø¨Ø±Ø¢ÙˆØ±Ø¯ Ø®Ø´Øª', n2: 'Brick Estimator', i: 'fa-layer-group', c: 'border-orange-500/20' },
                    { id: 'concrete', n1: 'Ø¨Ø±Ø¢ÙˆØ±Ø¯ Ú©Ø§Ù†Ú©Ø±ÛŒØª', n2: 'Concrete Estimator', i: 'fa-fill-drip', c: 'border-emerald-500/20' },
                    { id: 'steel', n1: 'Ø¨Ø±Ø¢ÙˆØ±Ø¯ Ø³ÛŒØ®â€ŒÚ¯ÙˆÙ„', n2: 'Rebar Estimator', i: 'fa-bars-staggered', c: 'border-slate-500/20' },
                    { id: 'slope', n1: 'Ù…Ø­Ø§Ø³Ø¨Ù‡ Ù…ÛŒÙ„', n2: 'Slope Calc', i: 'fa-chart-line', c: 'border-amber-500/20' },
                    { id: 'geometry', n1: 'Ø§Ø´Ú©Ø§Ù„ Ù‡Ù†Ø¯Ø³ÛŒ', n2: 'Geometry', i: 'fa-shapes', c: 'border-purple-500/20' },
                ]},
                { t1: "Ø§Ø¨Ø²Ø§Ø±Ù‡Ø§ÛŒ Ú©Ù…Ú©ÛŒ", t2: "Utility Tools", tools: [
                    { id: 'calculator', n1: 'Ù…Ø§Ø´ÛŒÙ† Ø­Ø³Ø§Ø¨', n2: 'Calculator', i: 'fa-calculator', c: 'border-pink-500/20' },
                    { id: 'converter', n1: 'ØªØ¨Ø¯ÛŒÙ„ ÙˆØ§Ø­Ø¯Ø§Øª', n2: 'Unit Converter', i: 'fa-exchange-alt', c: 'border-cyan-500/20' },
                    { id: 'date', n1: 'ØªØ¨Ø¯ÛŒÙ„ ØªØ§Ø±ÛŒØ®', n2: 'Date Converter', i: 'fa-calendar-alt', c: 'border-indigo-500/20' },
                    { id: 'ruler', n1: 'Ø®Ø·Ú©Ø´ Ø¯ÛŒØ¬ÛŒØªØ§Ù„', n2: 'Digital Ruler', i: 'fa-ruler-horizontal', c: 'border-yellow-500/20' },
                    { id: 'level', n1: 'Ø¢Ø¨ ØªØ±Ø§Ø² (Level)', n2: 'Bubble Level', i: 'fa-dot-circle', c: 'border-green-500/20' },
                    { id: 'glossary', n1: 'Ø¯Ø§ÛŒØ±Ù‡â€ŒØ§Ù„Ù…Ø¹Ø§Ø±Ù', n2: 'Encyclopedia', i: 'fa-book-atlas', c: 'border-amber-500/30' },
                ]}
            ];

            return (
                <div className="space-y-8 fade-in">
                    {sections.map((sec, idx) => (
                        <div key={idx} className="space-y-3">
                            <div className="flex justify-between items-end px-2 border-r-2 border-amber-400/30 pr-3">
                                <h2 className="text-[11px] font-black text-white uppercase">{sec.t1}</h2>
                                <span className="text-[8px] font-bold text-slate-500 uppercase">{sec.t2}</span>
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                {sec.tools.map(m => (
                                    <button key={m.id} onClick={() => setView(m.id)} className={`neo-panel p-4 rounded-3xl text-right flex flex-col items-start gap-3 active:scale-95 transition-all border-b-2 ${m.c}`}>
                                        <div className="p-2.5 bg-slate-800/80 rounded-2xl text-amber-400">
                                            <i className={`fas ${m.i} text-lg w-5 text-center`}></i>
                                        </div>
                                        <div className="space-y-0.5 text-right w-full">
                                            <h3 className="text-[12px] font-black text-white leading-none">{m.n1}</h3>
                                            <p className="text-[8px] font-bold text-slate-500 uppercase leading-none">{m.n2}</p>
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const ViewHeader = ({ t1, t2, icon, onBack }) => (
            <div className="flex items-center gap-4 mb-6">
                <button onClick={onBack} className="w-10 h-10 bg-slate-800 rounded-2xl flex items-center justify-center text-slate-400 active:scale-90 transition-all">
                    <i className="fas fa-arrow-right"></i>
                </button>
                <div className="space-y-0 text-right">
                    <div className="flex items-center gap-2">
                        <i className={`fas ${icon} text-amber-400 text-sm`}></i>
                        <h2 className="text-lg font-black text-white">{t1}</h2>
                    </div>
                    <p className="text-[9px] font-bold text-slate-500 uppercase tracking-widest">{t2}</p>
                </div>
            </div>
        );

        const Input = ({ l1, l2, onChange, value, type = "number", placeholder = "0.00" }) => (
            <div className="space-y-1">
                <div className="flex justify-between px-2">
                    <label className="text-[9px] font-black text-slate-400 uppercase">{l1}</label>
                    <label className="text-[8px] font-bold text-slate-600 uppercase italic">{l2}</label>
                </div>
                <input 
                    type={type} value={value} onChange={e => onChange(e.target.value)}
                    className="w-full input-field p-4 rounded-2xl text-white font-bold focus:border-amber-400 outline-none transition-all"
                    placeholder={placeholder}
                />
            </div>
        );

        const ResultItem = ({ l1, l2, value, unit, color="text-amber-400" }) => (
            <div className="flex justify-between items-center py-2.5 border-b border-white/5 last:border-0">
                <div className="flex flex-col items-start">
                    <span className="text-[10px] font-bold text-slate-400 leading-none">{l1}</span>
                    <span className="text-[7px] font-bold text-slate-600 uppercase leading-none mt-1">{l2}</span>
                </div>
                <span className={`text-base font-black ${color}`}>{value} <small className="text-[9px] text-white/40 font-normal">{unit}</small></span>
            </div>
        );

        const Formula = ({ t1, t2, text }) => (
            <div className="formula-box p-3 rounded-xl mb-4 text-amber-500/80 italic text-right">
                <div className="flex justify-between mb-1">
                    <div className="text-[8px] font-bold text-amber-500/40 uppercase tracking-widest">{t1}</div>
                    <div className="text-[8px] font-bold text-amber-500/40 uppercase tracking-widest">{t2}</div>
                </div>
                {text}
            </div>
        );

        const CopyBtn = ({ data }) => {
            const [copied, setCopied] = useState(false);
            const copy = () => {
                let text = `--- CIVIL MASTER RESULTS ---\n`;
                Object.entries(data).forEach(([k, v]) => text += `${k}: ${v}\n`);
                text += `\nShared by Yadgari Civil App`;
                navigator.clipboard.writeText(text);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };
            return (
                <button onClick={copy} className="w-full mt-4 flex items-center justify-center gap-2 text-[10px] font-bold text-slate-500 uppercase py-2 border border-dashed border-white/10 rounded-xl active:scale-95 transition-all">
                    <i className={`fas ${copied ? 'fa-check text-emerald-400' : 'fa-copy'}`}></i>
                    {copied ? 'Ú©Ø§Ù¾ÛŒ Ø´Ø¯ / Copied' : 'Ú©Ø§Ù¾ÛŒ Ø¨Ø±Ø§ÛŒ Ø§Ø±Ø³Ø§Ù„ / Copy Results'}
                </button>
            );
        };

        const FDTCalculator = ({ onBack }) => {
            const [v, setV] = useState({ ww: '', w1: '', w2: '', mc: '', mdd: '', wc: '1502', ds: '1.405' });
            const [res, setRes] = useState(null);
            const [showFormula, setShowFormula] = useState(false);
            
            const calc = () => {
                const s_ww = parseFloat(v.ww) || 0;
                const s_w1 = parseFloat(v.w1) || 0;
                const s_w2 = parseFloat(v.w2) || 0;
                const s_mc = parseFloat(v.mc) || 0;
                const s_mdd = parseFloat(v.mdd) || 0;
                const s_wc = parseFloat(v.wc) || 0;
                const s_ds = parseFloat(v.ds) || 0;

                if (!s_ww || !s_w1 || !s_w2 || !s_mdd || !s_ds) return;

                const sandUsed = s_w1 - s_w2;
                const sandInHole = sandUsed - s_wc;
                const holeVol = sandInHole / s_ds;
                const wetDensity = s_ww / holeVol;
                const dryDensity = wetDensity / (1 + (s_mc / 100));
                const compaction = (dryDensity / s_mdd) * 100;
                
                setRes({
                    sandUsed: sandUsed.toFixed(1),
                    sandInHole: sandInHole.toFixed(1),
                    holeVol: holeVol.toFixed(1),
                    wetDensity: wetDensity.toFixed(3),
                    dryDensity: dryDensity.toFixed(3),
                    compaction: compaction.toFixed(1)
                });
            };

            const loadSample = () => {
                // To get 95.8% with the user's data (Net soil was ~6640)
                setV({ ww: '6640', w1: '8881', w2: '3272', mc: '7.5', mdd: '2.206', wc: '1502', ds: '1.405' });
            };

            return (
                <div className="fade-in">
                    <ViewHeader t1="Ú©Ù…Ù¾Ú©Ø´Ù† ØªØ³Øª" t2="Compaction (FDT)" icon="fa-vial" onBack={onBack} />
                    
                    <div className="flex gap-2 mb-4">
                        <button onClick={loadSample} className="flex-1 py-2 bg-slate-800 rounded-xl text-[9px] font-bold text-amber-500 border border-amber-500/20 uppercase tracking-tighter">Ø¯Ø±Ø¬ Ø¯ÛŒØªØ§ÛŒ Ù†Ù…ÙˆÙ†Ù‡ / Load Sample</button>
                        <button onClick={() => setShowFormula(!showFormula)} className="w-12 h-10 bg-slate-800 rounded-xl flex items-center justify-center text-slate-400 border border-white/5">
                            <i className="fas fa-microchip text-xs"></i>
                        </button>
                    </div>

                    {showFormula && (
                        <div className="neo-panel p-4 rounded-2xl mb-4 space-y-2 text-[10px] text-slate-400 font-mono">
                            <p className="text-amber-500 font-bold mb-1 underline">Logic / Ù…Ù†Ø·Ù‚ Ù…Ø­Ø§Ø³Ø¨Ø§Øª:</p>
                            <p>1. Sand Used = Init. Cone - Resid. Cone</p>
                            <p>2. Sand In Hole = Sand Used - Cone Weight</p>

                    sumY += y; sumXY += x * y; sumX2Y += x * x * y;
                });

                // Simple 3x3 determinant solver (Cramer's Rule)
                const det = (m) => m[0][0]*(m[1][1]*m[2][2] - m[1][2]*m[2][1]) - m[0][1]*(m[1][0]*m[2][2] - m[1][2]*m[2][0]) + m[0][2]*(m[1][0]*m[2][1] - m[1][1]*m[2][0]);
