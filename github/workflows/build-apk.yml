name: Build Android APK via PWABuilder CloudAPK

on:
  workflow_dispatch:
    inputs:
      github_username:
        description: 'GitHub username'
        required: true
        default: 'yadgari-commits'
        type: string
      repo_name:
        description: 'Repository name'
        required: true
        default: 'YTG-Compaction-Test'
        type: string

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get install -y unzip

      - name: Wait for PWA to be live
        env:
          GH_USER: ${{ inputs.github_username }}
          REPO_NAME: ${{ inputs.repo_name }}
        run: |
          PWA_URL="https://${GH_USER}.github.io/${REPO_NAME}"
          echo "PWA URL: $PWA_URL"
          for i in {1..12}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$PWA_URL/index.html" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "PWA is live"
              exit 0
            fi
            echo "Attempt $i/12: HTTP $HTTP_CODE, retrying in 5s..."
            sleep 5
          done
          echo "::error::PWA not reachable"
          exit 1

      - name: Build APK
        env:
          GH_USER: ${{ inputs.github_username }}
          REPO_NAME: ${{ inputs.repo_name }}
        run: |
          PWA_URL="https://${GH_USER}.github.io/${REPO_NAME}"
          echo "Building from: $PWA_URL"

          PAYLOAD=$(cat <<JSONEOF
{
  "name": "Civil Master Pro",
  "shortName": "Civil",
  "launcherName": "Civil Master",
  "packageId": "com.yadgari.civilmasterpro",
  "host": "${PWA_URL}",
  "startUrl": "/?source=pwa",
  "themeColor": "#fbbf24",
  "backgroundColor": "#0f172a",
  "navigationColor": "#000000",
  "iconUrl": "${PWA_URL}/icons/icon-512.png",
  "maskableIconUrl": "${PWA_URL}/icons/icon-512-maskable.png",
  "webManifestUrl": "${PWA_URL}/manifest.json",
  "display": "standalone",
  "orientation": "default",
  "fallbackType": "customtabs",
  "appVersion": "4.0.0",
  "appVersionCode": 40,
  "enableNotifications": false,
  "signingMode": "none",
  "splashScreenFadeOutDuration": 300
}
JSONEOF
)

          echo "=== Payload ==="
          echo "$PAYLOAD"
          echo "================="

          echo "=== Calling CloudAPK ==="
          OUTPUT_ZIP=$(mktemp --suffix=.zip)
          HTTP_CODE=$(curl -s -o "$OUTPUT_ZIP" -w "%{http_code}" -X POST \
            "https://pwabuilder-cloudapk.azurewebsites.net/generateAppPackage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "HTTP Status: $HTTP_CODE"
          echo "Response size: $(du -h "$OUTPUT_ZIP" | cut -f1)"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::HTTP $HTTP_CODE"
            echo "Response body:"
            cat "$OUTPUT_ZIP"
            exit 1
          fi

          FILE_TYPE=$(file -b "$OUTPUT_ZIP" 2>/dev/null || echo "unknown")
          echo "File type: $FILE_TYPE"

          if [[ "$FILE_TYPE" != *"Zip archive"* ]] && [[ "$FILE_TYPE" != *"zip"* ]] && [[ "$FILE_TYPE" != *"ASCII"* ]]; then
            echo "::error::Response is not a zip"
            head -c 2000 "$OUTPUT_ZIP"
            exit 1
          fi

          rm -rf ./extracted
          mkdir -p ./extracted
          unzip -o "$OUTPUT_ZIP" -d ./extracted

          find ./extracted -name "*.apk" -exec cp {} civil-master-pro.apk \;

          if [ ! -f "civil-master-pro.apk" ] || [ ! -s "civil-master-pro.apk" ]; then
            echo "::error::No APK in zip"
            find ./extracted -type f
            exit 1
          fi

          echo "APK size: $(du -h civil-master-pro.apk | cut -f1)"
          ls -la *.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: civil-master-pro-apk
          path: |
            *.apk
          if-no-files-found: error
          retention-days: 30

      - name: Build summary
        if: success()
        run: |
          {
            echo "## APK Build Successful!"
            echo ""
            for f in *.apk; do
              [ -f "$f" ] && echo "- $f ($(du -h "$f" | cut -f1))"
            done
          } >> $GITHUB_STEP_SUMMARY
